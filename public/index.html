<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Keuangan - MyFinance AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased flex flex-col min-h-screen">
    
    <div class="max-w-5xl mx-auto px-4 py-6 md:py-10 flex-grow w-full">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-indigo-700 tracking-tight">Laporan Keuangan</h1>
                <p class="text-slate-500 text-sm mt-1" id="displayId">Memuat data asisten...</p>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="exportToExcel()" class="flex-1 md:flex-none bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 px-5 rounded-xl transition shadow-sm active:scale-95">
                    Excel Pro
                </button>
                <button onclick="printPage()" class="flex-1 md:flex-none bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-5 rounded-xl transition shadow-sm active:scale-95">
                    Cetak PDF
                </button>
            </div>
        </header>

        <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 mb-8">
            <div class="flex flex-wrap items-end gap-4">
                <div class="flex-1 min-w-[140px]">
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Pilih Bulan</label>
                    <select id="monthFilter" onchange="filterData()" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="all">Semua Bulan</option>
                        <option value="0">Januari</option><option value="1">Februari</option><option value="2">Maret</option>
                        <option value="3">April</option><option value="4">Mei</option><option value="5">Juni</option>
                        <option value="6">Juli</option><option value="7">Agustus</option><option value="8">September</option>
                        <option value="9">Oktober</option><option value="10">November</option><option value="11">Desember</option>
                    </select>
                </div>
                <div class="flex-1 min-w-[140px]">
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Pilih Tahun</label>
                    <select id="yearFilter" onchange="filterData()" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 focus:ring-2 focus:ring-indigo-500 outline-none">
                        </select>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <p class="text-xs font-bold text-emerald-500 uppercase">Pemasukan</p>
                <h2 class="text-2xl font-bold mt-1" id="totalIncome">Rp 0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <p class="text-xs font-bold text-rose-500 uppercase">Pengeluaran</p>
                <h2 class="text-2xl font-bold mt-1" id="totalExpense">Rp 0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-indigo-100 shadow-sm bg-indigo-50/30">
                <p class="text-xs font-bold text-indigo-600 uppercase">Saldo Bersih</p>
                <h2 class="text-2xl font-bold mt-1" id="netBalance">Rp 0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm h-[350px]">
                <h3 class="text-sm font-bold text-slate-400 uppercase mb-4">Proporsi Transaksi</h3>
                <div class="relative h-64">
                    <canvas id="chartType"></canvas>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm h-[350px]">
                <h3 class="text-sm font-bold text-slate-400 uppercase mb-4">Top Kategori</h3>
                <div class="relative h-64">
                    <canvas id="chartCategory"></canvas>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden mb-10">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/80 border-b border-slate-100">
                            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">Waktu</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">Kategori</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase text-right">Nominal</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>

        <footer class="mt-20 mb-8 text-center text-sm text-slate-400">
            Dibuat oleh <a href="https://play.google.com/store/apps/dev?id=6888173354290501082" target="_blank" rel="noopener noreferrer" class="text-indigo-600 hover:text-indigo-800 hover:underline font-semibold transition">Mas Wid</a>
        </footer>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chat_id');
        let allData = [];
        let filteredData = [];
        let chart1, chart2;

        async function init() {
            if (!chatId) {
                document.body.innerHTML = `<div class="h-screen flex items-center justify-center p-6 text-center"><div class="max-w-xs"><h1 class="text-2xl font-bold text-slate-800 mb-2">Akses Ditolak</h1><p class="text-slate-500">Silakan buka link ini melalui bot Telegram Anda.</p></div></div>`;
                return;
            }
            document.getElementById('displayId').innerText = `Chat ID: ${chatId}`;

            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();

            // 1. Set default bulan
            document.getElementById('monthFilter').value = currentMonth;

            // 2. Generasi Tahun Secara Dinamis
            const yearSelect = document.getElementById('yearFilter');
            yearSelect.innerHTML = ''; // Pastikan kosong sebelum diisi
            
            const startYear = 2024; // Tahun awal project/script dirilis
            const endYear = currentYear + 1; // Berikan opsi hingga 1 tahun ke depan

            for (let y = startYear; y <= endYear; y++) {
                const opt = new Option(y, y);
                yearSelect.add(opt);
            }
            
            // Pilih tahun saat ini sebagai default
            yearSelect.value = currentYear;
            
            try {
                const res = await fetch(`/api/data?chat_id=${chatId}`);
                allData = await res.json();
                filterData();
            } catch (err) {
                console.error("Gagal memuat data:", err);
            }
        }

        function filterData() {
            const m = document.getElementById('monthFilter').value;
            const y = document.getElementById('yearFilter').value;

            filteredData = allData.filter(t => {
                const d = new Date(t.created_at);
                const matchMonth = m === 'all' || d.getMonth() == m;
                const matchYear = d.getFullYear() == y;
                return matchMonth && matchYear;
            });

            updateUI(filteredData);
        }

        function updateUI(data) {
            let inc = 0, exp = 0;
            const cats = {};
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            data.forEach(t => {
                if (t.transaction_type === 'income') inc += t.amount;
                else exp += t.amount;

                cats[t.category] = (cats[t.category] || 0) + t.amount;

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="px-6 py-4 text-sm text-slate-500">${new Date(t.created_at).toLocaleDateString('id-ID')}</td>
                        <td class="px-6 py-4">
                            <span class="text-sm font-semibold capitalize">${t.category}</span>
                            <p class="text-[10px] text-slate-400 truncate max-w-[100px]">${t.description || '-'}</p>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <span class="text-sm font-bold ${t.transaction_type === 'income' ? 'text-emerald-600' : 'text-rose-600'}">
                                ${t.transaction_type === 'income' ? '+' : '-'} Rp ${t.amount.toLocaleString('id-ID')}
                            </span>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('totalIncome').innerText = `Rp ${inc.toLocaleString('id-ID')}`;
            document.getElementById('totalExpense').innerText = `Rp ${exp.toLocaleString('id-ID')}`;
            document.getElementById('netBalance').innerText = `Rp ${(inc - exp).toLocaleString('id-ID')}`;

            renderCharts(inc, exp, cats);
        }

        function renderCharts(inc, exp, cats) {
            if (chart1) chart1.destroy();
            if (chart2) chart2.destroy();

            chart1 = new Chart(document.getElementById('chartType'), {
                type: 'doughnut',
                data: {
                    labels: ['Masuk', 'Keluar'],
                    datasets: [{ data: [inc, exp], backgroundColor: ['#10b981', '#f43f5e'], borderWidth: 0 }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });

            chart2 = new Chart(document.getElementById('chartCategory'), {
                type: 'bar',
                data: {
                    labels: Object.keys(cats),
                    datasets: [{ label: 'Nominal', data: Object.values(cats), backgroundColor: '#6366f1', borderRadius: 8 }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function printPage() {
            try {
                window.print();
            } catch (e) {
                alert("Gagal mencetak. Silakan buka di browser eksternal (Chrome/Safari).");
            }
        }

        // ==========================================
        // FUNGSI EXCEL PRO (DENGAN STYLING & WIDTH)
        // ==========================================
        async function exportToExcel() {
            if (filteredData.length === 0) return alert("Nggak ada data buat diexport bos!");

            const workbook = new ExcelJS.Workbook();
            const worksheet = workbook.addWorksheet('Laporan Keuangan');

            // 1. Definisikan Kolom & Lebar Dasar
            worksheet.columns = [
                { header: 'Tanggal', key: 'date', width: 20 },
                { header: 'Kategori', key: 'category', width: 15 },
                { header: 'Tipe', key: 'type', width: 15 },
                { header: 'Nominal (Rp)', key: 'amount', width: 15 },
                { header: 'Keterangan', key: 'desc', width: 35 }
            ];

            // 2. Styling Header
            const headerRow = worksheet.getRow(1);
            headerRow.font = { bold: true, color: { argb: 'FFFFFF' } };
            headerRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: '4F46E5' } }; // Indigo 600
            headerRow.alignment = { vertical: 'middle', horizontal: 'center' };

            // 3. Masukkan Data
            filteredData.forEach(t => {
                const row = worksheet.addRow({
                    date: new Date(t.created_at).toLocaleString('id-ID'),
                    category: t.category,
                    type: t.transaction_type === 'income' ? 'Pemasukan' : 'Pengeluaran',
                    amount: t.amount,
                    desc: t.description || '-'
                });

                // Format angka nominal
                row.getCell(4).numFmt = '#,##0';
                // Warna teks nominal berdasarkan tipe
                if (t.transaction_type === 'income') {
                    row.getCell(4).font = { color: { argb: '10B981' }, bold: true };
                } else {
                    row.getCell(4).font = { color: { argb: 'F43F5E' }, bold: true };
                }
            });

            // 4. Border Otomatis & Auto-Column Width
            worksheet.eachRow((row, rowNumber) => {
                row.eachCell((cell) => {
                    cell.border = {
                        top: { style: 'thin' },
                        left: { style: 'thin' },
                        bottom: { style: 'thin' },
                        right: { style: 'thin' }
                    };
                });
            });

            // Logika Auto Width berdasarkan konten
            worksheet.columns.forEach(column => {
                let maxColumnLength = 0;
                column.eachCell({ includeEmpty: true }, (cell) => {
                    const columnLength = cell.value ? cell.value.toString().length : 10;
                    if (columnLength > maxColumnLength) {
                        maxColumnLength = columnLength;
                    }
                });
                column.width = maxColumnLength < 10 ? 10 : maxColumnLength + 2;
            });

            // 5. Download File
            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const url = window.URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            const m = document.getElementById('monthFilter').options[document.getElementById('monthFilter').selectedIndex].text;
            const y = document.getElementById('yearFilter').value;

            anchor.href = url;
            anchor.download = `Laporan_Keuangan_${m}_${y}.xlsx`;
            anchor.click();
            window.URL.revokeObjectURL(url);
        }

        init();
    </script>
</body>
</html>
